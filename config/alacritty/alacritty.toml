[general]
import = ["~/.config/alacritty/themes/themes/afterglow.toml"]

[env]
TERM = "alacritty"

[window]
padding = { x = 1, y = 1 }
decorations_theme_variant = "Dark"
dynamic_padding = true
option_as_alt = "Both"
blur = true

[font]
size = 11.0
offset = { x = 0, y = 1 }
builtin_box_drawing = true

[font.normal]
family = "Hack Nerd Font Mono"
style = "Regular"

[font.bold]
family = "Hack Nerd Font Mono"
style = "Bold"

[font.italic]
family = "Hack Nerd Font Mono"
style = "Italic"

[font.bold_italic]
family = "Hack Nerd Font Mono"
style = "Bold Italic"

[cursor]
style = { shape = "Block", blinking = "On" }
blink_interval = 750
thickness = 0.15

[terminal]
osc52 = "OnlyCopy"

[keyboard]
bindings = [
  # Alt+backspace deletes whole words
  { key = "Back", mods = "Alt", chars = "\u001b\u007f" },
  # Alt+left/right sends Ctrl+arrow sequences for word navigation
  { key = "Left", mods = "Alt", chars = "\u001b[1;5D" },
  { key = "Right", mods = "Alt", chars = "\u001b[1;5C" },
]

[scrolling]
history = 10000
multiplier = 3

[mouse]
hide_when_typing = true

[selection]
semantic_escape_chars = ",│`|:\"' ()[]{}<>\t"
save_to_clipboard = true

# URL hints: Ctrl+Shift+U → type hint letters → opens URL with xdg-open
[hints]
alphabet = "jfkdlsahgurieowpq"

[[hints.enabled]]
command = "xdg-open"
hyperlinks = true
post_processing = true
persist = false
mouse.enabled = true
binding = { key = "U", mods = "Control|Shift" }
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini://|gopher://|https://|http://|news:|file:|git://|ssh:|ftp://)[^\u0000-\u001F\u007F-\u009F<>\"\\s{-}\\^⟨⟩`]+"
